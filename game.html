<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sniper Ball Challenge</title>

<style>

body{
margin:0;
overflow:hidden;
background:url('https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a?q=80&w=1600');
background-size:cover;
font-family:Arial;
color:white;
}

#score{
position:fixed;
top:20px;
left:20px;
font-size:30px;
font-weight:bold;
}

#ball{
position:absolute;
width:100px;
height:100px;
cursor:pointer;
transition:0.2s;
}

#crosshair{
position:fixed;
font-size:40px;
pointer-events:none;
transform:translate(-50%,-50%);
}

</style>
</head>

<body>

<div id="score">
🏆 Score : 0
</div>

<div id="crosshair">
🎯
</div>

<img
id="ball"
src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg"
>

<script>

let score = 0;

const ball =
document.getElementById('ball');

function moveBall(){

const x =
Math.random()*(window.innerWidth-120);

const y =
Math.random()*(window.innerHeight-120);

ball.style.left = x+'px';
ball.style.top = y+'px';

}

ball.onclick = function(){

score++;

document.getElementById(
'score'
).innerHTML =
'🏆 Score : '+score;

moveBall();

};

document.addEventListener(
'mousemove',
function(e){

document.getElementById(
'crosshair'
).style.left =
e.clientX+'px';

document.getElementById(
'crosshair'
).style.top =
e.clientY+'px';

}
);

moveBall();

setInterval(
moveBall,
1500
);

</script>

</body>
</html>
