<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sniper Ball Challenge</title>

<style>

#timer{
position:fixed;
top:60px;
left:20px;
font-size:24px;
font-weight:bold;
}

#lives{
position:fixed;
top:100px;
left:20px;
font-size:24px;
font-weight:bold;
}

#best{
position:fixed;
top:140px;
left:20px;
font-size:24px;
font-weight:bold;
}
  
body{
margin:0;
overflow:hidden;
background:url('https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a?q=80&w=1600');
background-size:cover;
font-family:Arial;
color:white;
}

#score{
position:fixed;
top:20px;
left:20px;
font-size:30px;
font-weight:bold;
}

#ball{
position:absolute;
width:100px;
height:100px;
cursor:pointer;
transition:0.2s;
}

#crosshair{
position:fixed;
font-size:40px;
pointer-events:none;
transform:translate(-50%,-50%);
}

</style>
</head>

<body>

<div id="score">
🏆 Score : 0
</div>

<div id="timer">
⏱️ Time : 60
</div>

<div id="lives">
❤️❤️❤️
</div>

<div id="best">
🥇 Best : 0
</div>

<div id="crosshair">
🔫
</div>

<img
id="ball"
src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg"
>

<script>

let score = 0;
let combo = 0;
let lives = 3;
let timeLeft = 60;
let bestScore =
localStorage.getItem('bestScore') || 0;

document.getElementById(
'best'
).innerHTML =
'🥇 Best : ' + bestScore;

const ball =
document.getElementById('ball');

function moveBall(){

const x =
Math.random()*(window.innerWidth-120);

const y =
Math.random()*(window.innerHeight-120);

ball.style.left = x+'px';
ball.style.top = y+'px';

}

ball.onclick = function(){

if(timeLeft <= 0){
return;
}

score++;
combo++;

document.getElementById(
'score'
).innerHTML =
'🏆 Score : ' + score;

if(combo >= 3){

const comboText =
document.createElement('div');

comboText.innerHTML =
'🔥 COMBO x' + combo;

comboText.style.position='fixed';
comboText.style.top='50%';
comboText.style.left='50%';
comboText.style.transform='translate(-50%,-50%)';
comboText.style.fontSize='50px';
comboText.style.fontWeight='bold';
comboText.style.color='gold';
comboText.style.zIndex='9999';

document.body.appendChild(comboText);

setTimeout(()=>{
comboText.remove();
},800);

}
moveBall();

};

document.addEventListener(
'mousemove',
function(e){

document.getElementById(
'crosshair'
).style.left =
e.clientX+'px';

document.getElementById(
'crosshair'
).style.top =
e.clientY+'px';

}
);

moveBall();

const gameTimer = setInterval(function(){

timeLeft--;

document.getElementById(
'timer'
).innerHTML =
'⏱️ Time : ' + timeLeft;

if(timeLeft <= 0){

clearInterval(gameTimer);

ball.style.display = 'none';

document.getElementById(
'score'
).innerHTML =
'💀 GAME OVER';

if(score > bestScore){

bestScore = score;

localStorage.setItem(
'bestScore',
score
);

document.getElementById(
'best'
).innerHTML =
'🥇 Best : ' + bestScore;

}

}

},1000);

setInterval(
moveBall,
1500
);

</script>

<button
onclick="location.reload()"
style="
position:fixed;
top:20px;
right:20px;
padding:10px 20px;
">
🔄 Restart
</button>
  
</body>
</html>
