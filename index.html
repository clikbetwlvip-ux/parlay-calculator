    <script>
    
    let currentMode = 'parlay';
    
    function setMode(mode){
    
    currentMode = mode;
    
    document.getElementById(
    'singleBtn'
    ).classList.remove('active');
    
    document.getElementById(
    'parlayBtn'
    ).classList.remove('active');
    
    if(mode === 'single'){
    
    document.getElementById(
    'singleBtn'
    ).classList.add('active');
    
    document.getElementById(
    'legSection'
    ).style.display = 'none';
    
    document.getElementById(
    'legCount'
    ).value = '1';
    
    updateLegs();
    
    }else{
    
    document.getElementById(
    'parlayBtn'
    ).classList.add('active');
    
    document.getElementById(
    'legSection'
    ).style.display = 'block';
    
    updateLegs();
    
    }
    
    calculate();
    
    }
        
    function addMatch(){
    
    const div=document.createElement("div");
    const legNumber =
    document.querySelectorAll('.match').length + 1;
    
    div.className="match";
    
   div.innerHTML=`

<div style="
position:absolute;
top:10px;
right:15px;
font-size:12px;
color:#666;
">
#${legNumber}
</div>

<div style="
display:grid;
grid-template-columns:1fr 1.6fr 70px;
gap:25px;
align-items:end;
">

<div>

<label>Odds</label>

<input
type="number"
step="0.01"
class="odd"
placeholder="1.90"
oninput="calculate()">

</div>

<div style="
padding-left:20px;
border-left:1px solid rgba(255,215,0,.25);
">

<label>Status</label>

<select
class="status"
onchange="calculate()">

<option value="win">✅ Menang</option>
<option value="halfwin">🟢 Menang Setengah</option>
<option value="void">⚪ Push / Refund</option>
<option value="halflose">🟠 Kalah Setengah</option>

</select>

</div>

<button
class="del"
onclick="this.closest('.match').remove(); calculate();"
style="
display:${currentMode === 'single' ? 'none' : 'inline-block'};
width:55px;
height:55px;
background:#e11d48;
border:none;
border-radius:12px;
font-size:22px;
color:white;
cursor:pointer;
">
🗑️
</button>

</div>

`;
    
    document.getElementById("matches").appendChild(div);
    }
    
    updateLegs();
    calculate();
    
    function updateLegs(){
    
    const count =
    parseInt(
    document.getElementById(
    'legCount'
    ).value
    );
    
    const matches =
    document.getElementById(
    'matches'
    );
    
    matches.innerHTML='';
    
    for(
    let i=0;
    i<count;
    i++
    ){
    addMatch();
    }
    
    calculate();
    
    }
        
    function calculate(){
    
    const stake=parseFloat(
    document.getElementById("stake").value.replace(/,/g,'')
    )||0;
    
    if(stake <= 0){
    
    const emptyTitle =
    currentMode === 'single'
    ? '⚽ Hasil Single Bet'
    : '🏆 Hasil Parlay';
    
    document.getElementById("result").innerHTML = `
    <h2>${emptyTitle}</h2>
    <p>Masukkan Stake dan Odds terlebih dahulu</p>
    `;
    
    return;
    }
    const odds=document.querySelectorAll(".odd");
    const status=document.querySelectorAll(".status");
    
    let total=1;
    
    for(let i=0;i<odds.length;i++){
    
    let odd=parseFloat(odds[i].value)||1;
    
    switch(status[i].value){
    
    case "win":
    odd=odd;
    break;
    
    case "halfwin":
    odd=1+((odd-1)/2);
    break;
    
    case "void":
    odd=1;
    break;
    
    case "halflose":
    odd=0.5;
    break;
    
    case "lose":
    odd=0;
    break;
    }
    
    total*=odd;
    }
    
    if(currentMode === 'single'){
    
    let firstOdd =
    parseFloat(
    document.querySelector('.odd')?.value
    ) || 1;
    
    const firstStatus =
    document.querySelector('.status')?.value;
    
    switch(firstStatus){
    
    case "halfwin":
    firstOdd = 1 + ((firstOdd - 1)/2);
    break;
    
    case "void":
    firstOdd = 1;
    break;
    
    case "halflose":
    firstOdd = 0.5;
    break;
    
    }
    
    total = firstOdd;
    
    }
        
    const payout=stake*total;
    const profit=payout-stake;
    const roi = stake > 0 ? ((profit / stake) * 100) : 0;    
    
    const formatNumber = (num) => {
        return num.toLocaleString('en-US', {
            minimumFractionDigits: 0,
            maximumFractionDigits: 2
        });
    };    
    
    const resultTitle =
    currentMode === 'single'
    ? '⚽ Hasil Single Bet'
    : '🏆 Hasil Parlay';
    
document.getElementById("result").innerHTML=`

<h2 style="text-align:center;">
${resultTitle}
</h2>

<div style="
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
align-items:end;
margin-bottom:20px;
">

<div style="
background:rgba(255,255,255,.04);
padding:15px;
border-radius:15px;
text-align:center;
border:1px solid rgba(255,215,0,.15);
">
🎯<br>
<b>Total Odds</b><br>
${total.toFixed(2)}
</div>

<div style="
background:rgba(255,255,255,.04);
padding:15px;
border-radius:15px;
text-align:center;
border:1px solid rgba(255,215,0,.15);
">
💰<br>
<b>Payout</b><br>

<div style="
font-size:30px;
font-weight:bold;
color:#ffd700;
margin-top:5px;

text-shadow:
0 0 10px #ffd700,
0 0 20px #ffd700,
0 0 40px #ffd700;
">
${formatNumber(payout)}
</div>

</div>

<div style="
background:rgba(255,255,255,.04);
padding:15px;
border-radius:15px;
text-align:center;
border:1px solid rgba(255,215,0,.15);
">
📈<br>
<b>Profit</b><br>

<span style="
color:${profit >= 0 ? '#00ff88' : '#ff4d4d'};
font-weight:bold;
">
${formatNumber(profit)}
</span>

</div>

<div style="
background:rgba(255,255,255,.04);
padding:15px;
border-radius:15px;
text-align:center;
border:1px solid rgba(255,215,0,.15);
">
🚀<br>
<b>ROI</b><br>
${roi.toFixed(2)}%
</div>

</div>
`;
    }
    
    function copyResult(){
    
    let text = "🏆 PARLAY ELITE 🏆\n\n";
    
    const stake =
    document.getElementById("stake").value;
    
    text += `💵 Stake : ${stake}\n\n`;
    
    const odds =
    document.querySelectorAll(".odd");
    
    const status =
    document.querySelectorAll(".status");
    
    for(let i=0;i<odds.length;i++){
    
    text += `⚽ Leg #${i+1}\n`;
    
    text += `Odds : ${odds[i].value}\n`;
    
    text += `Status : ${status[i].options[status[i].selectedIndex].text}\n\n`;
    
    }
    
    text += "━━━━━━━━━━━━━━\n\n";
    
    text += document.getElementById("result").innerText;
    
    navigator.clipboard.writeText(text);
    
    alert("Slip berhasil disalin!");
    }
    
    
    </script>
