<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlay Calculator Pro</title>

<style>
body{
    font-family: Arial, sans-serif;
    color:white;
    margin:0;
    padding:20px;

    background:
    linear-gradient(
    rgba(0,0,0,.60),
    rgba(0,0,0,.60)
    ),
    url('https://i.pinimg.com/1200x/b9/4e/65/b94e6573612cd2e588c053cdf637c7d7.jpg');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    min-height:100vh;
}

.container{
    max-width:900px;
    margin:auto;
    background:rgba(0,0,0,.75);
    padding:25px;
    border-radius:15px;
}

h1{
    text-align:center;
    color:#ffd700;
    font-size:42px;
    letter-spacing:3px;
    text-shadow:0 0 20px #ffd700;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:8px;
}
#matches{
    display:block;
}
    
.match{
    background:#1c1c1c;
    padding:15px;
    border-radius:12px;
    border-left:4px solid #ffd700;
    margin-bottom:15px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

.add{background:#00aa55;color:white;}
.calc{background:#0066ff;color:white;}
.del{
    background:#cc2222;
    color:white;
    padding:6px 12px;
    font-size:12px;
}

.logo{
    animation:
    pulse 5s infinite,
    goldGlow 4s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }
}

@keyframes goldGlow{

    0%{
        box-shadow:0 0 10px #ffd700;
    }

    50%{
        box-shadow:0 0 35px #ffd700;
    }

    100%{
        box-shadow:0 0 10px #ffd700;
    }
}
    
.result{
    margin-top:20px;
    background:#111;
    padding:20px;
    border-radius:10px;
}

.bet-mode{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

.bet-mode button{
padding:12px 25px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
background:#222;
color:white;
transition:.3s;
}

.bet-mode button.active{
background:gold;
color:black;
box-shadow:0 0 15px gold;
}

    
</style>
</head>
<body>

<div class="container">
    
<h1>🏆Kalkulator Parlay🏆</h1>

<p style="
text-align:center;
color:#ffd700;
font-size:18px;
font-weight:bold;
text-shadow:0 0 15px #ffd700;
margin-top:-10px;
margin-bottom:25px;
">
Professional Odds & Parlay Calculator
</p>

<div class="bet-mode">

<button
id="singleBtn"
onclick="setMode('single')">
⚽ Single Bet
</button>

<button
id="parlayBtn"
class="active"
onclick="setMode('parlay')">
🏆 Parlay
</button>

</div>

<label>Jumlah Pertandingan</label>

<select
id="legCount"
onchange="updateLegs()">

<option value="1">1 Match</option>
<option value="2">2 Match</option>
<option value="3">3 Match</option>
<option value="5">5 Match</option>
<option value="10">10 Match</option>

</select>
    
<label>Stake</label>
<input
type="text"
id="stake"
placeholder="500,000"
oninput="
this.value=this.value.replace(/[^0-9]/g,'');
this.value=Number(this.value).toLocaleString('en-US');
calculate();
">

<div id="matches"></div>

<div class="result" id="result">
...
</div>

<div style="
margin-top:20px;
text-align:center;
">

<a href="https://t.me/NAMA_TELEGRAM">
📲 Telegram
</a>

<a href="https://wa.me/628xxxxxxxxxx">
📱 WhatsApp
</a>

</div>

<button onclick="copyResult()">
📋 Copy Result
</button>

</div>

<script>

let currentMode = 'parlay';

function setMode(mode){

currentMode = mode;

document.getElementById(
'singleBtn'
).classList.remove('active');

document.getElementById(
'parlayBtn'
).classList.remove('active');

if(mode === 'single'){
   
document.getElementById(
'singleBtn'
).classList.add('active');

while(
document.querySelectorAll('.match').length > 1
){
document
.querySelectorAll('.match')[1]
.remove();
}

}else{
    
document.getElementById(
'parlayBtn'
).classList.add('active');

}

calculate();

}
    
function addMatch(){

const div=document.createElement("div");
const legNumber =
document.querySelectorAll('.match').length + 1;

div.className="match";

div.innerHTML=`

<label>Odds</label>

<input
type="number"
step="0.01"
class="odd"
placeholder="1.90"
oninput="calculate()">

<label>Status</label>

<select
class="status"
onchange="calculate()">

<option value="win">✅ Menang</option>
<option value="halfwin">🟢 Menang Setengah</option>
<option value="void">⚪ Push / Refund</option>
<option value="halflose">🟠 Kalah Setengah</option>

</select>

<button
class="del"
onclick="this.parentElement.remove(); calculate();">
Hapus
</button>

`;

document.getElementById("matches").appendChild(div);
}

updateLegs();
calculate();

function updateLegs(){

const count =
parseInt(
document.getElementById(
'legCount'
).value
);

const matches =
document.getElementById(
'matches'
);

matches.innerHTML='';

for(
let i=0;
i<count;
i++
){
addMatch();
}

calculate();

}
    
function calculate(){

const stake=parseFloat(
document.getElementById("stake").value.replace(/,/g,'')
)||0;

if(stake <= 0){

const emptyTitle =
currentMode === 'single'
? '⚽ Hasil Single Bet'
: '🏆 Hasil Parlay';

document.getElementById("result").innerHTML = `
<h2>${emptyTitle}</h2>
<p>Masukkan Stake dan Odds terlebih dahulu</p>
`;

return;
}
const odds=document.querySelectorAll(".odd");
const status=document.querySelectorAll(".status");

let total=1;

for(let i=0;i<odds.length;i++){

let odd=parseFloat(odds[i].value)||1;

switch(status[i].value){

case "win":
odd=odd;
break;

case "halfwin":
odd=1+((odd-1)/2);
break;

case "void":
odd=1;
break;

case "halflose":
odd=0.5;
break;

case "lose":
odd=0;
break;
}

total*=odd;
}

if(currentMode === 'single'){

let firstOdd =
parseFloat(
document.querySelector('.odd')?.value
) || 1;

const firstStatus =
document.querySelector('.status')?.value;

switch(firstStatus){

case "halfwin":
firstOdd = 1 + ((firstOdd - 1)/2);
break;

case "void":
firstOdd = 1;
break;

case "halflose":
firstOdd = 0.5;
break;

}

total = firstOdd;

}
    
const payout=stake*total;
const profit=payout-stake;
const roi = stake > 0 ? ((profit / stake) * 100) : 0;    

const formatNumber = (num) => {
    return num.toLocaleString('en-US', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
    });
};    

const resultTitle =
currentMode === 'single'
? '⚽ Hasil Single Bet'
: '🏆 Hasil Parlay';

document.getElementById("result").innerHTML=`
<h2>${resultTitle}</h2>

<p>🎯 Total Odds : <b>${total.toFixed(2)}</b></p>

<p>💰 Payout : <b>${formatNumber(payout)}</b></p>

<p>📈 Profit : <b style="color:#00ff88">${formatNumber(profit)}</b></p>

<p>🚀 ROI : <b style="color:#ffd700">${roi.toFixed(2)}%</b></p>
`;
}

function copyResult(){

let text = "🏆 PARLAY ELITE 🏆\n\n";

const stake =
document.getElementById("stake").value;

text += `💵 Stake : ${stake}\n\n`;

const odds =
document.querySelectorAll(".odd");

const status =
document.querySelectorAll(".status");

for(let i=0;i<odds.length;i++){

text += `⚽ Leg #${i+1}\n`;

text += `Odds : ${odds[i].value}\n`;

text += `Status : ${status[i].options[status[i].selectedIndex].text}\n\n`;

}

text += "━━━━━━━━━━━━━━\n\n";

text += document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("Slip berhasil disalin!");
}


</script>

</body>
</html>
