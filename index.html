<!DOCTYPE html>
<html lang="id">  
<head>
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Parlay</title>

<style>
body{
    font-family: Arial, sans-serif;  
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>
<body>

<h1>Kalkulator Parlay</h1>

<label>Modal (Stake)</label>
<input type="number" id="stake" placeholder="100">

<label>Odds (pisahkan dengan koma)</label>
<input type="text" id="odds" placeholder="1.80, 2.10, 1.65">

<button onclick="calculate()">Hitung</button>

<div class="result" id="result"></div>

<script>
function calculate() {
    const stake = parseFloat(document.getElementById('stake').value);
    const oddsInput = document.getElementById('odds').value;

    if (!stake || !oddsInput) {
        alert('Isi stake dan odds terlebih dahulu');
        return;
    }

    const odds = oddsInput.split(',').map(o => parseFloat(o.trim()));

    let totalOdds = 1;

    for (let odd of odds) {
        totalOdds *= odd;
    }

    const payout = stake * totalOdds;
    const profit = payout - stake;

    document.getElementById('result').innerHTML = `
        <p><b>Total Odds:</b> ${totalOdds.toFixed(2)}</p>
        <p><b>Payout:</b> ${payout.toFixed(2)}</p>
        <p><b>Profit:</b> ${profit.toFixed(2)}</p>
    `;
}
</script>

</body>
</html>
