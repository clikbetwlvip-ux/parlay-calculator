<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlay Calculator Pro</title>

<style>
body{
    font-family: Arial, sans-serif;
    color:white;
    margin:0;
    padding:20px;
    background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
    url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1600');
    background-size:cover;
    background-position:center;
    min-height:100vh;
}

.container{
    max-width:900px;
    margin:auto;
    background:rgba(0,0,0,.75);
    padding:25px;
    border-radius:15px;
}

h1{
    text-align:center;
    color:#00ff88;
    font-size:42px;
    letter-spacing:3px;
    text-shadow:0 0 15px #00ff88;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:8px;
}

.match{
    background:#1c1c1c;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

.add{background:#00aa55;color:white;}
.calc{background:#0066ff;color:white;}
.del{background:#cc2222;color:white;}

.result{
    margin-top:20px;
    background:#111;
    padding:20px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="container">

<div style="text-align:center;margin-bottom:10px;">
    <img
    src="https://livescore-clickbet88.com/frontend-asset?url=https%3A%2F%2Flivescore-cgg.com%2Fimages%2F0d4df6e9-9af8-44a2-8049-ba7a9b458ebe.webp"
    width="140"
    style="
    border-radius:15px;
    box-shadow:0 0 20px #00ff88;
    ">
</div>
    
<h1>🏆 PARLAY ELITE 🏆</h1>

<p style="
text-align:center;
color:#ffd700;
font-size:18px;
font-weight:bold;
text-shadow:0 0 15px #ffd700;
margin-top:-10px;
margin-bottom:25px;
">
Professional Odds & Parlay Calculator
</p>

<label>Stake</label>
<input
type="text"
id="stake"
placeholder="500,000"
oninput="
this.value=this.value.replace(/[^0-9]/g,'');
this.value=Number(this.value).toLocaleString('en-US');
calculate();
">

<div id="matches"></div>

<button class="add" onclick="addMatch()">+ Tambah Match</button>
<button class="calc" onclick="calculate()">Hitung</button>

<div class="result" id="result">
Masukkan data lalu klik Hitung
</div>

</div>

<script>

function addMatch(){

const div=document.createElement("div");

div.className="match";

div.innerHTML=`
<label>Odds</label>
<input
type="number"
step="0.01"
class="odd"
placeholder="1.90"
oninput="calculate()">

<label>Status</label>
<select
class="status"
onchange="calculate()">
<option value="win">Win</option>
<option value="halfwin">Half Win</option>
<option value="void">Void</option>
<option value="halflose">Half Lose</option>    
<option value="lose">Lose</option>
</select>

<button class="del" onclick="this.parentElement.remove()">Hapus</button>
`;

document.getElementById("matches").appendChild(div);
}

addMatch();
calculate();

function calculate(){

const stake=parseFloat(
document.getElementById("stake").value.replace(/,/g,'')
)||0;

const odds=document.querySelectorAll(".odd");
const status=document.querySelectorAll(".status");

let total=1;

for(let i=0;i<odds.length;i++){

let odd=parseFloat(odds[i].value)||1;

switch(status[i].value){

case "win":
odd=odd;
break;

case "halfwin":
odd=1+((odd-1)/2);
break;

case "void":
odd=1;
break;

case "halflose":
odd=0.5;
break;

case "lose":
odd=0;
break;
}

total*=odd;
}

const payout=stake*total;
const profit=payout-stake;

const formatNumber = (num) => {
    return num.toLocaleString('en-US', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
    });
};    

document.getElementById("result").innerHTML=`
<h2>Hasil</h2>
<p>Total Odds : <b>${total.toFixed(2)}</b></p>
<p>Payout : <b>${formatNumber(payout)}</b></p>
<p>Profit : <b>${formatNumber(profit)}</b></p>
`;
}

</script>

</body>
</html>
